name: Create Release

on:
  push:
    tags:
      - '*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Upload files to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release
          cp rebuild.sh strings.conf lflist.conf genesys.conf release
          tar -czvf packages.tar.gz -C release .
          gh release create "$TAG_NAME" --title "$TAG_NAME" update.sh packages.tar.gz
